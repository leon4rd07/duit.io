<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="duit-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8f6c"/>
      <stop offset="100%" stop-color="#e85d3a"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#duit-bg)"/>

  <!-- Wallet body outline -->
  <rect x="12" y="20" width="40" height="28" rx="5"
        fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Top flap divider line -->
  <line x1="12" y1="28" x2="52" y2="28"
        stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Clasp / button -->
  <circle cx="43" cy="38" r="4.5" fill="#ffffff"/>
  <circle cx="43" cy="38" r="1.8" fill="url(#duit-bg)"/>
</svg>
