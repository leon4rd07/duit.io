<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="duit-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8f6c"/>
      <stop offset="100%" stop-color="#e85d3a"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#duit-bg)"/>

  <!-- Stack 1: shortest (left) -->
  <ellipse cx="16" cy="48" rx="8" ry="2.5" fill="white" opacity="0.75"/>
  <rect x="8" y="42" width="16" height="6" fill="white" opacity="0.75"/>
  <ellipse cx="16" cy="42" rx="8" ry="2.5" fill="#ffffff"/>

  <!-- Stack 2: medium (center) -->
  <ellipse cx="32" cy="48" rx="8" ry="2.5" fill="white" opacity="0.85"/>
  <rect x="24" y="32" width="16" height="16" fill="white" opacity="0.85"/>
  <ellipse cx="32" cy="32" rx="8" ry="2.5" fill="#ffffff"/>

  <!-- Stack 3: tallest (right) with Rp -->
  <ellipse cx="48" cy="48" rx="8" ry="2.5" fill="white" opacity="0.95"/>
  <rect x="40" y="20" width="16" height="28" fill="white" opacity="0.95"/>
  <ellipse cx="48" cy="20" rx="8" ry="2.5" fill="#ffffff"/>

  <!-- Rp accent on tallest stack -->
  <text x="48" y="38" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="10"
        fill="url(#duit-bg)">Rp</text>
</svg>
