<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#1a1a1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="duit.io"/>
  <meta name="description" content="Personal money manager for Indonesia"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" type="image/svg+xml" href="/icon.svg"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <title>duit.io</title>
</head>
<body>
  <!-- Loading screen -->
  <div class="loading-overlay" id="loading">
    <div class="loading-logo">duit<span>.io</span></div>
    <div class="spinner"></div>
  </div>

  <!-- Setup modal -->
  <div id="setup-modal" style="display:none"></div>

  <!-- Auth screen -->
  <div id="auth-screen" style="display:none"></div>

  <!-- Main app -->
  <div id="app"></div>

  <!-- Camera modal -->
  <div id="camera-modal"></div>

  <!-- INPUT MODAL -->
<div class="sheet-overlay" id="input-modal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title" id="input-modal-title">Input</div>
      <button class="sheet-close" onclick="closeSheet('input-modal')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="field">
        <label id="input-modal-label">Label</label>
        <input type="text" id="input-modal-field" placeholder=""/>
      </div>
      <div class="field" id="input-modal-field2-wrap" style="display:none">
        <label id="input-modal-label2">Label 2</label>
        <input type="password" id="input-modal-field2" placeholder=""/>
      </div>
      <div id="input-modal-desc" class="text-muted text-sm" style="margin-bottom:12px"></div>
      <div class="sheet-actions">
        <button class="btn btn-ghost" onclick="closeSheet('input-modal')">Batal</button>
        <button class="btn btn-accent" id="input-modal-submit" onclick="window._inputModalSubmit && window._inputModalSubmit()">OK</button>
      </div>
    </div>
  </div>
</div>


<!-- CURRENCY MODAL -->
<div class="sheet-overlay" id="currency-modal">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title">Pilih Mata Uang</div>
      <button class="sheet-close" onclick="closeSheet('currency-modal')">✕</button>
    </div>
    <div class="sheet-body">
      <div id="currency-list"></div>
    </div>
  </div>
</div>


<!-- SCAN RESULT MODAL -->
<div class="sheet-overlay" id="scan-result-modal"></div>

  <!-- Entry point -->
  <script type="module" src="/src/js/app.js"></script>
</body>
</html>
