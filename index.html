<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#1a1a1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="duit.io"/>
  <meta name="description" content="Personal money manager for Indonesia"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" type="image/svg+xml" href="/icon.svg"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <title>duit.io</title>
</head>
<body>
  <!-- Loading screen -->
  <div class="loading-overlay" id="loading">
    <div class="loading-logo">duit<span>.io</span></div>
    <div class="spinner"></div>
  </div>

  <!-- Setup modal -->
  <div id="setup-modal" style="display:none"></div>

  <!-- Auth screen -->
  <div id="auth-screen" style="display:none"></div>

  <!-- Main app -->
  <div id="app"></div>

  <!-- Camera modal -->
  <div id="camera-modal"></div>
  <div class="cam-flash" id="cam-flash"></div>
  <input type="file" id="gallery-input" accept="image/*" style="display:none"/>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Entry point -->
  <script type="module" src="/src/js/app.js"></script>
</body>
</html>
